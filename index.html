<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイプ相性表</title>

<style>
body{
    margin:0;
    background:#111;
    overflow:hidden;
    touch-action:none;
}

/* アイコン */
#toggle{
    position:fixed;
    top:20px;
    left:20px;
    width:64px;
    height:64px;
    border:none;
    background:transparent;
    padding:0;
    z-index:9999;
}

#toggle img{
    width:64px;
    height:64px;
    border-radius:50%;
    display:block;
}

/* タイプ相性表 */
#img{
    display:none;
    position:fixed;
    width:140px;
    height:auto;
    border-radius:10px;
    box-shadow:0 4px 12px rgba(0,0,0,.5);
    z-index:9998;
}

</style>
</head>

<body>

<button id="toggle">
    <img src="button.png" alt="ボタン">
</button>

<img id="img" src="type.png" alt="タイプ相性表">


<script>

const btn = document.getElementById("toggle");
const img = document.getElementById("img");

let dragging = false;
let moved = false;

let startX = 0;
let startY = 0;
let startLeft = 0;
let startTop = 0;


/* type.pngをアイコン右側・中央の高さに配置 */
function moveTypeImage(){

    const rect = btn.getBoundingClientRect();

    // 横：アイコンの右側
    img.style.left = (rect.right + 10) + "px";

    // 縦：type.pngの一番上をアイコン中央に合わせる
    img.style.top =
        (rect.top + rect.height / 2) + "px";

}


btn.addEventListener("pointerdown", (e)=>{

    dragging = true;
    moved = false;

    startX = e.clientX;
    startY = e.clientY;

    startLeft = btn.offsetLeft;
    startTop = btn.offsetTop;

    btn.setPointerCapture(e.pointerId);

});


btn.addEventListener("pointermove", (e)=>{

    if(!dragging) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;


    if(Math.abs(dx)>5 || Math.abs(dy)>5){
        moved = true;
    }


    btn.style.left = (startLeft + dx) + "px";
    btn.style.top = (startTop + dy) + "px";


    if(img.style.display === "block"){
        moveTypeImage();
    }

});


btn.addEventListener("pointerup", ()=>{

    dragging = false;


    if(!moved){

        if(img.style.display === "none"){

            img.style.display = "block";
            moveTypeImage();

        }else{

            img.style.display = "none";

        }

    }

});

</script>

</body>
</html>
