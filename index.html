<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイプ相性表</title>

<style>
body{
    margin:0;
    background:#111;
}

#toggle{
    position:fixed;
    top:10px;
    left:10px;
    z-index:9999;
    width:48px;
    height:48px;
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
}

#toggle img{
    width:48px;
    height:48px;
    border-radius:50%;
    display:block;
}

#img{
    width:100%;
    height:auto;
    display:block;
}
</style>

</head>
<body>

<button id="toggle">
    <img src="button.png" alt="切替">
</button>

<img id="img" src="type.png" alt="タイプ相性表">

<script>
const img = document.getElementById("img");
const btn = document.getElementById("toggle");

btn.onclick = function () {
    if (img.style.display === "none") {
        img.style.display = "block";
    } else {
        img.style.display = "none";
    }
};
</script>

</body>
</html>
